<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>リサーチ定点観測</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #12151c;
      --panel: #1a1e27;
      --line: #2a2f3a;
      --text: #e6e8ee;
      --muted: #a6adbb;
      --blue: #5b8def;
      --violet: #8a7de0;
    }
    body {
      margin: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 20px;
      font-weight: 700;
    }
    table {
      width: 100%;
      margin-bottom: 28px;
      border-collapse: collapse;
      background: var(--panel);
    }
    th, td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      font-size: 14px;
    }
    th:first-child, td:first-child {
      text-align: left;
    }
    th {
      color: var(--muted);
      font-weight: 600;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
    }
    canvas {
      min-height: 280px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    @media (max-width: 800px) {
      body {
        margin: 14px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      th, td {
        padding: 8px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <h1>リサーチ定点観測</h1>
  <table id="channels">
    <thead>
      <tr><th>チャンネル</th><th>登録者</th><th>総再生</th><th>伸び/日</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="grid">
    <canvas id="durations"></canvas>
    <canvas id="words"></canvas>
  </div>
  <script>
    async function main() {
      const report = await (await fetch("/api/report")).json();
      const tbody = document.querySelector("#channels tbody");
      for (const channel of report.channels) {
        const row = document.createElement("tr");
        const velocity = channel.velocityPerDay == null ? "-" : Math.round(channel.velocityPerDay).toLocaleString();
        row.innerHTML = `<td>${escapeHtml(channel.title)}</td><td>${channel.subscriberCount.toLocaleString()}</td><td>${channel.viewCount.toLocaleString()}</td><td>${velocity}</td>`;
        tbody.appendChild(row);
      }

      new Chart(document.getElementById("durations"), {
        type: "bar",
        data: {
          labels: report.durationBuckets.map((bucket) => bucket.label),
          datasets: [{ label: "尺の分布", data: report.durationBuckets.map((bucket) => bucket.count), backgroundColor: "#5b8def" }]
        }
      });

      new Chart(document.getElementById("words"), {
        type: "bar",
        data: {
          labels: report.topWords.map((word) => word.word),
          datasets: [{ label: "頻出語", data: report.topWords.map((word) => word.count), backgroundColor: "#8a7de0" }]
        },
        options: { indexAxis: "y" }
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[char]));
    }

    main();
  </script>
</body>
</html>
